    Versão: fundo claro
  -->

  <!-- Símbolo: escudo heráldico centralizado, tamanho natural 48x52 -->
  <svg x="16" y="2" width="48" height="52" viewBox="0 0 48 52">
    <defs>
      <clipPath id="ssc">
        <path d="M24 5 L7 14 V29 C7 39 16 46 24 49 C32 46 41 39 41 29 V14 L24 5 Z"/>
