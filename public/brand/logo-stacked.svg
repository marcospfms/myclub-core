    </defs>
    <path d="M24 2 L4 11 V29 C4 40 13 48 24 50 C35 48 44 40 44 29 V11 L24 2 Z" fill="#126A43"/>
    <path d="M24 5 L7 14 V29 C7 39 16 46 24 49 C32 46 41 39 41 29 V14 L24 5 Z"
