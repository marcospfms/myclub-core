<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" aria-label="MyClub">
  <!--
    MyClub — Favicon / App Icon
    Fundo quadrado arredondado: Club Green #126A43
    Marca: M com picos para CIMA (correto), Tape White
    Acento: gema Victory Gold no vale do M
    Otimizado para 16px, 32px, 48px — elementos simplificados para máxima clareza
  -->
  <rect width="48" height="48" rx="10" fill="#126A43"/>
  <!-- M ascendente: base nos cantos inferiores, picos no terço superior -->
  <path
    d="M10 38 L18 16 L24 26 L30 16 L38 38"
    stroke="#F5F7F3"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- C de Club — abaixo do M -->
  <text
    x="24" y="37"
    text-anchor="middle"
    font-family="Manrope, system-ui, sans-serif"
    font-size="8"
    font-weight="700"
    fill="#F5F7F3"
  >C</text>
</svg>

